<style>
.site-footer {
  background-color: #0d1b2a;
  color: #a0aec0;
  text-align: center;
  padding: 1.2rem 1rem;
  font-family: 'Lato', sans-serif;
  font-size: 0.9rem;
  margin-top: 3rem;
  border-top: 3px solid #1b2a6b;
}
.site-footer a {
  color: #90a8e8;
  text-decoration: none;
}
.site-footer a:hover {
  color: #ffffff;
}
</style>

<footer class="site-footer">
  <p style="margin:0;">
    &copy; 2026 Akanshya Dash &nbsp;&middot;&nbsp;
    MPH in Epidemiology, Emory University &nbsp;&middot;&nbsp;
    <a href="https://github.com/Akanshya1998" target="_blank"><i class="fab fa-github"></i> GitHub</a>
    &nbsp;&middot;&nbsp;
    <a href="https://www.linkedin.com/in/akanshyadash/" target="_blank"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
  </p>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function() {
  var links = document.querySelectorAll(".navbar-nav a");
  links.forEach(function(link) {
    if (link.textContent.trim() === "GitHub") {
      link.innerHTML = '<i class="fab fa-github"></i> GitHub';
      link.setAttribute("target", "_blank");
    }
    if (link.textContent.trim() === "LinkedIn") {
      link.innerHTML = '<i class="fab fa-linkedin-in"></i> LinkedIn';
      link.setAttribute("target", "_blank");
    }
  });
});
</script>
